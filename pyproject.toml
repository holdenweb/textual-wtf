[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "textual-wtf"
version = "0.9.0a5"
description = "Declarative forms library for Textual TUI applications"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Steve Holden" }]
dependencies = [
    "textual>=0.47.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4",
    "pytest-asyncio>=0.23",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.hatch.build.targets.wheel]
packages = ["src/textual_wtf"]

[dependency-groups]
dev = [
    "pytest-asyncio>=1.3.0",
    "textual-dev>=1.8.0",
]
